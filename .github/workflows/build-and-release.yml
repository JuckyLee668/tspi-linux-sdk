name: Build Linux SDK and Release update.img

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 720

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Show initial disk usage
        run: |
          echo "== Initial disk usage =="
          df -h

      - name: Free disk space on runner
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          docker system prune -af || true
          echo "== Disk usage after cleanup =="
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git-lfs git ssh make gcc libssl-dev liblz4-tool expect \
            g++ patchelf chrpath gawk texinfo diffstat binfmt-support \
            qemu-user-static live-build bison flex fakeroot cmake gcc-multilib \
            g++-multilib unzip device-tree-compiler ncurses-dev python2

      - name: Pull LFS files
        run: git lfs pull

      - name: Build firmware
        run: |
          echo "2" | ./build.sh init
          ./build.sh

      - name: Locate update.img
        id: find_image
        run: |
          IMAGE_PATH="$(find output -type f -path '*/update.img' | head -n 1)"
          if [ -z "$IMAGE_PATH" ]; then
            echo "No update.img found under output/"
            exit 1
          fi
          echo "Found update image: $IMAGE_PATH"
          echo "image_path=$IMAGE_PATH" >> "$GITHUB_OUTPUT"

      - name: Split Large File into Chunks (No Compression)
        id: split_image
        run: |
          set -euo pipefail
          
          # 获取上一步找到的镜像路径
          IMAGE_PATH="${{ steps.find_image.outputs.image_path }}"
          RELEASE_DIR="$GITHUB_WORKSPACE/release-assets"
          mkdir -p "$RELEASE_DIR"
          
          # 定义文件大小限制 (GitHub Release 限制为 2GB)
          MAX_SIZE_BYTES=2147483648
          # 分卷大小设为 1.9GB，留出安全余量
          CHUNK_SIZE="1900M"
          
          echo "Splitting large image into chunks smaller than 2GB..."
          # 使用 split 命令进行分卷
          # -b: 指定分卷大小
          # -d: 使用数字后缀 (000, 001, ...)
          # -a 3: 后缀长度为3位
          split -b ${CHUNK_SIZE} "$IMAGE_PATH" "$RELEASE_DIR/update.img.part-"
          
          # 验证分卷是否成功且每个分卷都小于限制
          echo "== Validating chunk sizes =="
          for chunk in "$RELEASE_DIR"/update.img.part-*; do
            if [ -f "$chunk" ]; then
              size=$(stat -c%s "$chunk")
              if [ "$size" -gt "$MAX_SIZE_BYTES" ]; then
                echo "Error: Chunk $chunk exceeds 2GB limit."
                exit 1
              fi
              echo "✓ $chunk : $(du -h "$chunk" | cut -f1)"
            fi
          done

      - name: Upload build artifact (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: update-img-chunks
          path: release-assets/*

      - name: Upload chunks to GitHub Release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG_NAME="${{ github.event.release.tag_name }}"
          shopt -s nullglob
          FILES=(release-assets/*)
          
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No files to upload!"
            exit 1
          fi
          
          echo "Uploading the following files to Release $TAG_NAME:"
          ls -lh "${FILES[@]}"
          
          # 上传所有分卷文件
          gh release upload "$TAG_NAME" "${FILES[@]}" --clobber
